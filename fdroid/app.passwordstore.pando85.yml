Name: Password Store (Passkey Edition)
Summary: pass-compatible password manager with passkey/WebAuthn support
Description: |
    Password Store is a pass-compatible password manager for Android.
    It stores passwords and secrets as OpenPGP-encrypted text files,
    compatible with the standard Unix password manager "pass".
    Acts as an Android passkey (WebAuthn) Credential Provider,
    allowing use of stored credentials for passwordless sign-in
    on supported apps and websites.

    This is a community-maintained fork (pando85) of the archived
    Android Password Store project, adding passkey/WebAuthn support
    and ongoing maintenance. Built from source; no proprietary
    dependencies. Google Play Services auth was removed for F-Droid.

    Licensed under GPL-3.0-only.

MaintainerNotes: |
    Community fork (pando85) of the archived upstream project
    android-password-store/Android-Password-Store.
    .
    The upstream `credentials-play-services-auth` module (which
    depended on Google Play Services) has been removed entirely
    so the F-Droid build has no proprietary dependencies.
    .
    The signing keystore (`keystore.jks`) and its plaintext
    `keystore.properties` are gitignored and NOT shipped in the
    repo; only OpenSSL-encrypted backups (`secrets/*.cipher`,
    passphrase-protected) are committed for CI release signing.
    These are irrelevant to F-Droid's own build, which is built
    unsigned and signed by F-Droid with its own key. The
    encrypted `secrets/` blobs are excluded from the source
    scanner via scanignore.
    .
    The launcher label is "Password Store"; the
    "(Passkey Edition)" suffix shown in F-Droid is set via the
    Name field in this metadata file.
    .
    The default `assembleRelease` Gradle task (gradle: yes) emits
    an UNSIGNED APK at `app/build/outputs/apk/release/app-release-unsigned.apk`,
    since the signing keystore is gitignored and absent in F-Droid's
    clean clone. F-Droid then signs it with its own key. The custom
    `:app:collectReleaseApks` rename task is NOT used for this build.
    .
    versionCode scheme (from app/version.properties):
    major*10000 + minor*100 + patch. Deterministic.
    .
    Tags follow the pattern `v<version>` (e.g. v1.16.3).

RepoType: git
Repo: https://github.com/pando85/Android-Password-Store

AutoUpdateMode: Version v%v
UpdateCheckMode: Tags v.*
UpdateCheckData: app/version.properties|versioning-plugin\.versionCode=(\d+)|.|versioning-plugin\.versionName=([\d.]+)
CurrentVersion: 1.17.2
CurrentVersionCode: 11702

Builds:
  - versionName: '1.17.2'
    versionCode: 11702
    commit: v1.17.2
    gradle: yes
    output: app/build/outputs/apk/release/app-release-unsigned.apk
    scanignore:
      - secrets/
