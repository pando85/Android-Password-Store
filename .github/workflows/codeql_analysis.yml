name: "CodeQL"

on:
  workflow_dispatch:
  # push:
    # branches:
      # - develop
  # pull_request:
    # branches:
      # - develop

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
    - name: Setup build environment
      uses: agrahn/android-password-store/.github/reusable-workflows/setup-gradle@develop

    - name: Initialize CodeQL
      uses: github/codeql-action/init@fc7e4a0fa01c3cca5fd6a1fddec5c0740c977aa2 # v3.28.14
      with:
        languages: java
        tools: latest
        queries: +security-extended

    - name: Build project
      shell: bash
      run: ./gradlew assembleFreeRelease

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@fc7e4a0fa01c3cca5fd6a1fddec5c0740c977aa2 # v3.28.14
      with:
        category: "/language:java"
