name: "CodeQL"

on:
  workflow_dispatch:
  # push:
    # branches:
      # - develop
  # pull_request:
    # branches:
      # - develop

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
    - name: Setup build environment
      uses: agrahn/android-password-store/.github/reusable-workflows/setup-gradle@c1e2044949aca678363a91368a7b0d16a6233073 # develop
      with:
        java-version: 21

    - name: Initialize CodeQL
      uses: github/codeql-action/init@b8bb9f28b8d3f992092362369c57161b755dea45 # v4.35.0
      with:
        languages: java
        tools: latest
        queries: +security-extended

    - name: Build project
      shell: bash
      run: ./gradlew assembleRelease

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@b8bb9f28b8d3f992092362369c57161b755dea45 # v4.35.0
      with:
        category: "/language:java"
